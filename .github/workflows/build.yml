name: Build binaries

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  build:

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyinstaller

    - name: Build binary
      run: |
        pyinstaller --onefile src/verbal_assault.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: verbal-assault-${{ runner.os }}
        path: dist/*
